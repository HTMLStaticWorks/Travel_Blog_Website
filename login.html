<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Travelog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="overflow: hidden;">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 8px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--secondary);">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                Travelog.
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="home2.html">Home 2</a></li>
                <li><a href="services.html">Destinations</a></li>
                <li><a href="blog.html">Stories</a></li>
                <li><a href="contact.html">Reach Us</a></li>
                <li><button class="theme-toggle" aria-label="Toggle Theme">🌙</button></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle Theme">🌙</button>
                <a href="signup.html" class="btn btn-primary" style="padding: 10px 24px; color: #fff;">Join Now</a>
                <button class="menu-toggle" aria-label="Toggle Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Auth Page (Hero) -->
    <div class="auth-page"
        style="background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), url('https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your premium account</p>
            </div>
            <form>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group" style="margin-bottom: 12px;">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; font-size: 0.9rem;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--secondary); font-weight: 500;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Join Now</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
