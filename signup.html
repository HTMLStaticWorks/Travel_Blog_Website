<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Now | Travelog</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="overflow: hidden;">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 8px;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--secondary);">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                Travelog.
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="home2.html">Home 2</a></li>
                <li><a href="services.html">Destinations</a></li>
                <li><a href="blog.html">Stories</a></li>
                <li><a href="contact.html">Reach Us</a></li>
                <li><button class="theme-toggle" aria-label="Toggle Theme">🌙</button></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle Theme">🌙</button>
                <a href="signup.html" class="btn btn-primary" style="padding: 10px 24px; color: #fff;">Join Now</a>
                <button class="menu-toggle" aria-label="Toggle Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Auth Page (Hero) -->
    <div class="auth-page"
        style="background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Join Travelog</h1>
                <p>Gain access to premium itineraries</p>
            </div>
            <form>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" placeholder="John" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" placeholder="Doe" required>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group" style="margin-bottom: 32px;">
                    <label class="form-label">Create Password</label>
                    <input type="password" class="form-input" placeholder="Minimum 8 characters" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>
            <div class="auth-footer">
                <p>Already a member? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
