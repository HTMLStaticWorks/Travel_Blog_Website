<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Now | Travelog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body style="overflow-y: auto;" class="hide-scrollbar">

    <!-- Auth Page (Hero) -->
    <div class="auth-page"
        style="background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;">
        
        <!-- Simplified Minimal Header Moved Inside -->
        <header class="auth-nav" style="position: relative; width: 100%; display: flex; justify-content: flex-end; align-items: center; padding: 20px 5%;">
        </header>

        <div class="auth-card" style="max-width: 520px;">
            <div style="display: flex; justify-content: center; width: 100%;">
                <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 8px; justify-content: center;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="color: var(--secondary);">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    Travelog.
                </a>
            </div>
            <div class="auth-header">
                <h1 style="font-family: 'Playfair Display', serif; font-size: 1.2rem;">Join Travelog</h1>
                <p>Gain access to premium itineraries</p>
            </div>
            <form>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" placeholder="John" required>
                    </div>
                <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" placeholder="Doe" required>
                    </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="Enter your email" required>
                </div>
                
                <!-- Password Fields Row 1 -->
                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <!-- Confirm Password Field Row 2 -->
                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" placeholder="Confirm your password" required>
                </div>

                <div class="terms-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I accept the <a href="#">Terms & Conditions</a>.</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 12px; font-weight: 700; padding: 16px; margin-top: 16px;">CREATE ACCOUNT</button>
            </form>

            <div class="social-auth">
                <p class="social-title"><span>OR SIGN UP WITH</span></p>
                <div class="social-btns">
                    <button class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>
                    <button class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.39.07 2.35.74 3.17.8 1.21-.24 2.37-.93 3.67-.84 1.58.13 2.77.72 3.54 1.84-3.25 1.97-2.79 5.9.48 7.23-.57 1.5-1.31 2.99-2.86 3.83zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                        </svg>
                        Apple
                    </button>
                    <button class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        Email
                    </button>
                </div>
            </div>

            <div class="auth-footer">
                <p>Already a member? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
